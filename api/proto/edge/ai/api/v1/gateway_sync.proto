syntax = "proto3";

package edge.ai.api.v1;

import "google/protobuf/timestamp.proto";

// GatewaySyncService is the internal API between Control Plane and
// gateway-runtime instances. Not exposed to edge-agent.
service GatewaySyncService {
  rpc PushRegionalTask(PushRegionalTaskRequest) returns (PushRegionalTaskResponse);
  rpc SyncGatewayStatus(SyncGatewayStatusRequest) returns (SyncGatewayStatusResponse);
  rpc NotifyIdentityEvent(NotifyIdentityEventRequest) returns (NotifyIdentityEventResponse);
}

message PushRegionalTaskRequest {
  string task_id = 1;
  string type = 2;
  string gateway_id = 3;
  bytes payload = 4;
  repeated string target_node_ids = 5;
}

message PushRegionalTaskResponse {
  int32 expanded_count = 1;
  int32 claimed_count = 2;
}

message NodeStatusSummary {
  string node_id = 1;
  bool online = 2;
  string agent_version = 3;
  google.protobuf.Timestamp last_seen_at = 4;
}

message SyncGatewayStatusRequest {
  string gateway_id = 1;
  repeated NodeStatusSummary node_statuses = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message SyncGatewayStatusResponse {}

enum IdentityEventType {
  IDENTITY_EVENT_TYPE_UNSPECIFIED = 0;
  IDENTITY_EVENT_TYPE_REVOKED = 1;
  IDENTITY_EVENT_TYPE_RENEWED = 2;
  IDENTITY_EVENT_TYPE_SUSPENDED = 3;
}

message NotifyIdentityEventRequest {
  string identity_id = 1;
  string node_id = 2;
  IdentityEventType event_type = 3;
  string fingerprint = 4;
  google.protobuf.Timestamp timestamp = 5;
}

message NotifyIdentityEventResponse {}
