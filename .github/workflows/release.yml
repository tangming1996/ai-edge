name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION_FILE: go.mod
  GO_CACHE_DEPENDENCY_PATH: go.sum
  DOCKER_IMAGE_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE != '' && vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
  DOCKER_IMAGE_PREFIX: docker.io/${{ vars.DOCKERHUB_NAMESPACE != '' && vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}/edgeai

jobs:
  verify:
    name: Verify Release Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}
      - uses: bufbuild/buf-setup-action@v1
      - name: Run proto lint
        run: make proto-lint
      - name: Verify generated artifacts
        run: make verify-generate
      - name: Run static checks
        run: make check
      - name: Run tests
        run: make test
      - name: Verify licenses
        run: make verify-license

  binaries:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}
      - name: Build release binaries
        run: |
          make checksums \
            VERSION="${GITHUB_REF_NAME}" \
            GIT_COMMIT="${GITHUB_SHA}" \
            BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
      - uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: dist/*
          if-no-files-found: error

  images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service:
          - apiserver
          - controller
          - gateway-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: docker-meta
        name: Compute Docker tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - id: build-meta
        name: Compute build metadata
        run: echo "build_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
      - name: Publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: manifests/dockerfiles/Dockerfile.${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build-meta.outputs.build_date }}
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - binaries
      - images
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: dist
      - name: Generate release summary
        run: |
          cat > release-notes.md <<EOF
          ## Release Assets

          - Linux binaries for: \`apiserver\`, \`controller\`, \`gateway-runtime\`, \`edge-agent\`, \`edgectl\`
          - macOS binaries for: \`edgectl\`
          - Architectures: \`linux/amd64\`, \`linux/arm64\`, \`darwin/amd64\`, \`darwin/arm64\`
          - Checksums: \`checksums.txt\`

          ## Docker Images

          - \`${{ env.DOCKER_IMAGE_PREFIX }}-apiserver:${{ github.ref_name }}\`
          - \`${{ env.DOCKER_IMAGE_PREFIX }}-controller:${{ github.ref_name }}\`
          - \`${{ env.DOCKER_IMAGE_PREFIX }}-gateway-runtime:${{ github.ref_name }}\`
          - Docker namespace: \`${{ env.DOCKER_IMAGE_NAMESPACE }}\`

          EOF
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release-notes.md
          files: dist/*
