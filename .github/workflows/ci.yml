name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  GO_VERSION_FILE: go.mod
  GO_CACHE_DEPENDENCY_PATH: go.sum
  GOLANGCI_LINT_VERSION: v2.12.2
  MIGRATE_VERSION: v4.17.0
  MIGRATE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/edgeai_test?sslmode=disable

jobs:
  proto:
    name: Proto Lint & Breaking
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
      - uses: bufbuild/buf-breaking-action@v1
        with:
          against: "https://github.com/${{ github.repository }}.git#branch=main"

  go:
    name: Go Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}

      - name: Vet
        run: go vet ./...

      - name: Build all commands
        run: |
          for cmd in apiserver controller gateway-runtime edge-agent edgectl; do
            go build -o bin/$cmd ./cmd/$cmd
          done

      - name: Test
        run: go test -race -cover ./...

  migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edgeai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install migrate
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/golang-migrate/migrate/releases/download/${{ env.MIGRATE_VERSION }}/migrate.linux-amd64.tar.gz" | tar xvz
          sudo mv migrate /usr/local/bin/migrate
      - name: Run migrations up
        run: migrate -path migrations -database "${{ env.MIGRATE_DATABASE_URL }}" up
      - name: Run migrations down
        run: migrate -path migrations -database "${{ env.MIGRATE_DATABASE_URL }}" down -all

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}
      - uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-mode: goinstall
