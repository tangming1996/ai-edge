name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  GO_VERSION_FILE: go.mod
  GO_CACHE_DEPENDENCY_PATH: go.sum
  MIGRATE_VERSION: v4.17.0
  MIGRATE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/edgeai_test?sslmode=disable

jobs:
  contracts:
    name: Proto & Generated Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}
      - uses: bufbuild/buf-setup-action@v1
      - name: Proto lint
        run: make proto-lint
      - uses: bufbuild/buf-breaking-action@v1
        with:
          against: "https://github.com/${{ github.repository }}.git#branch=main"
      - name: Verify generated artifacts
        run: make verify-generate

  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}
      - name: Static checks
        run: make check
      - name: Build all commands
        run: make build
      - name: Test
        run: make test

  licenses:
    name: Verify Licenses
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true
          cache-dependency-path: ${{ env.GO_CACHE_DEPENDENCY_PATH }}
      - name: Verify licenses
        run: make verify-license

  migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edgeai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install migrate
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/golang-migrate/migrate/releases/download/${{ env.MIGRATE_VERSION }}/migrate.linux-amd64.tar.gz" | tar xvz
          sudo mv migrate /usr/local/bin/migrate
      - name: Run migrations up
        run: migrate -path migrations -database "${{ env.MIGRATE_DATABASE_URL }}" up
      - name: Run migrations down
        run: migrate -path migrations -database "${{ env.MIGRATE_DATABASE_URL }}" down -all

  images:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service:
          - apiserver
          - controller
          - gateway-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Manifests/dockerfiles/Dockerfile.${{ matrix.service }}
          platforms: linux/amd64
          push: false
