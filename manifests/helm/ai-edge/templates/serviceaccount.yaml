{{- /*
  ServiceAccounts for the control-plane components.
  Each Deployment / DaemonSet references `{{ include "ai-edge.fullname" . }}-<component>`
  as `serviceAccountName`, so we must create matching SA resources here.
*/}}
{{- if .Values.apiserver.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ai-edge.fullname" . }}-apiserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
{{- end }}
---
{{- if .Values.controller.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ai-edge.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
{{- end }}
---
{{- if .Values.gatewayRuntime.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ai-edge.fullname" . }}-gateway-runtime
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
{{- end }}
