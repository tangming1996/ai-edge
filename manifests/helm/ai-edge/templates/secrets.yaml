{{- /* Auto-generated Secrets. See docs/helm-secrets.md.
   Triggers:
   - postgresql.enabled=true (and not postgresql.auth.existingSecret) -> postgresql secret
   - minio.enabled=true      (and not minio.auth.existingSecret)      -> minio secret
   - db.createSecret=true OR postgresql.enabled=true (and not db.existingSecret) -> db secret
   - apiserver.ca.generate=true            -> apiserver CA secret
   - gatewayRuntime.tls.generate=true      -> gateway mTLS server cert
   - gatewayRuntime.ca.generate=true       -> gateway CA bundle
*/}}

{{- /* Compute the apiserver CA once (if any consumer needs it) so the
   apiserver CA secret and the gateway mTLS cert share the same key
   material. */ -}}
{{- $apiserverCa := "" -}}
{{- $apiserverCaCert := "" -}}
{{- $apiserverCaKey := "" -}}
{{- if .Values.apiserver.ca.generate }}
{{- $apiserverCaSubject := printf "CN=%s" (default "edgeai-platform-ca" .Values.apiserver.ca.commonName) -}}
{{- $apiserverCa = genCA $apiserverCaSubject 3650 -}}
{{- $apiserverCaCert = $apiserverCa.Cert -}}
{{- $apiserverCaKey = $apiserverCa.Key -}}
{{- end }}

{{- if and .Values.postgresql.enabled (not .Values.postgresql.auth.existingSecret) }}
{{- $pgSecretName := include "ai-edge.postgresqlSecretName" . -}}
{{- $pgPassword := default (randAlphaNum 24) .Values.postgresql.auth.password -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pgSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: Opaque
data:
  password: {{ $pgPassword | b64enc | quote }}
{{- end }}
{{- if and .Values.minio.enabled (not .Values.minio.auth.existingSecret) }}
---
{{- $minioSecretName := include "ai-edge.minioSecretName" . -}}
{{- $minioPassword := default (randAlphaNum 24) .Values.minio.auth.rootPassword -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $minioSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
type: Opaque
data:
  rootuser: {{ .Values.minio.auth.rootUser | b64enc | quote }}
  rootpassword: {{ $minioPassword | b64enc | quote }}
{{- end }}
{{- if and (eq (include "ai-edge.dbCreateSecret" .) "true") (not .Values.db.existingSecret) }}
---
{{- $dbSecretName := include "ai-edge.dbSecretName" . -}}
{{- $dbPassword := default (randAlphaNum 24) .Values.db.password -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $dbSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
data:
  password: {{ $dbPassword | b64enc | quote }}
  username: {{ .Values.db.username | b64enc | quote }}
  database: {{ .Values.db.database | b64enc | quote }}
{{- end }}
{{- if .Values.apiserver.ca.generate }}
---
{{- $caSecretName := include "ai-edge.apiserverCaSecretName" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $caSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
type: kubernetes.io/tls
data:
  ca.crt: {{ $apiserverCaCert | b64enc | quote }}
  tls.crt: {{ $apiserverCaCert | b64enc | quote }}
  tls.key: {{ $apiserverCaKey | b64enc | quote }}
{{- end }}
{{- if .Values.gatewayRuntime.tls.generate }}
---
{{- $gwTlsSecretName := include "ai-edge.gatewayTlsSecretName" . -}}
{{- $gwSubject := printf "CN=%s" (default "edgeai-gateway" .Values.gatewayRuntime.tls.commonName) -}}
{{- $gwCert := "" -}}
{{- if $apiserverCaCert }}
{{- $gwCert = genSignedCert $gwSubject (list) (list) 365 $apiserverCa -}}
{{- else }}
{{- $gwCert = genSelfSignedCert $gwSubject (list) 365 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $gwTlsSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: kubernetes.io/tls
data:
  {{- if $apiserverCaCert }}
  ca.crt: {{ $apiserverCaCert | b64enc | quote }}
  {{- end }}
  tls.crt: {{ $gwCert.Cert | b64enc | quote }}
  tls.key: {{ $gwCert.Key | b64enc | quote }}
{{- end }}
{{- if and .Values.gatewayRuntime.ca.generate (not .Values.apiserver.ca.generate) }}
---
{{- $gwCaSecretName := include "ai-edge.gatewayCaSecretName" . -}}
{{- $caSubject3 := printf "CN=%s" (default "edgeai-gateway-ca" .Values.gatewayRuntime.ca.commonName) -}}
{{- $gwCa := genCA $caSubject3 3650 -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $gwCaSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
data:
  ca.crt: {{ $gwCa.Cert | b64enc | quote }}
{{- end }}
