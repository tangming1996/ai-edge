{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ai-edge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "ai-edge.labels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
      {{- with .Values.postgresql.primary.podLabels }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgresql.primary.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: tcp-postgresql
              containerPort: {{ .Values.postgresql.service.port }}
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username }}
            - name: POSTGRES_PASSWORD
              # 密码来源优先级:
              #   1) postgresql.auth.existingSecret(若设置,使用运维自建 Secret)
              #   2) 默认与 apiserver / controller / gateway 共享 `edgeai-db`,
              #      避免 chart 自管 PG 模式下密码漂移。
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-edge.postgresPasswordSecretName" . }}
                  key: password
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database }}
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.auth.username | quote }}]
            initialDelaySeconds: {{ .Values.postgresql.primary.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.postgresql.primary.livenessProbe.periodSeconds }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.auth.username | quote }}]
            initialDelaySeconds: {{ .Values.postgresql.primary.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.postgresql.primary.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 10 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          {{- if .Values.postgresql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-postgresql
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.postgresql.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  accessModes:
    - ReadWriteOnce
  {{- include "ai-edge.pvc" (dict "root" . "component" "postgresql" "size" .Values.postgresql.persistence.size) | nindent 2 }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: {{ .Values.postgresql.service.type }}
  selector:
    {{- include "ai-edge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
  ports:
    - name: tcp-postgresql
      port: {{ .Values.postgresql.service.port }}
      targetPort: tcp-postgresql
      protocol: TCP
{{- end }}
