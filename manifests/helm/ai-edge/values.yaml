global:
  imageRegistry: tming3379
  imagePullPolicy: IfNotPresent
  storageClass: ""

namespace: edgeai-system

imagePullSecrets: []

apiserver:
  enabled: true
  replicaCount: 2
  image:
    repository: edgeai-apiserver
    tag: "latest"
  service:
    type: ClusterIP
    grpcPort: 9090
    httpPort: 8080
  env:
    DB_SSLMODE: disable
    GRPC_ADDR: ":9090"
    HTTP_ADDR: ":8080"
  # CA certificate used to sign bootstrap / leaf certs.
  # Leave `ca.existingSecret` empty and set `ca.generate=true` to let the
  # chart render a self-signed CA on first install.
  ca:
    existingSecret: ""
    generate: false
    commonName: "edgeai-platform-ca"
    # When the secret is generated, it will be named:
    #   {{ include "ai-edge.fullname" . }}-apiserver-ca
    secretName: ""
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 5

controller:
  enabled: true
  replicaCount: 1
  image:
    repository: edgeai-controller
    tag: "latest"
  env:
    DB_SSLMODE: disable
    POLL_INTERVAL: 10s
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 256Mi

gatewayRuntime:
  enabled: true
  image:
    repository: edgeai-gateway-runtime
    tag: "latest"
  service:
    type: LoadBalancer
    grpcPort: 9443
    httpPort: 8081
  hostNetwork: false
  nodeSelector:
    node.edgeai.io/role: gateway
  tolerations:
    - key: node.edgeai.io/role
      value: gateway
      effect: NoSchedule
  env:
    CONTROL_PLANE_ADDR: "ai-edge-apiserver.edgeai-system.svc.cluster.local:9090"
    HTTP_ADDR: ":8081"
    GRPC_ADDR: ":9443"
    CACHE_DIR: "/var/lib/edgeai/gateway-cache"
    IDENTITY_CACHE_TTL: 30s
    TASK_CLAIM_DURATION: 5m
    CONNECTIVITY_CHECK_INTERVAL: 10s
    CONNECTIVITY_TIMEOUT: 5s
  # mTLS server certificate (tls.crt / tls.key) presented to edge-agents.
  # Either point at your own secret or set `tls.generate=true` for a
  # self-signed cert.
  tls:
    existingSecret: ""
    generate: false
    commonName: "edgeai-gateway"
    # Resolved secret name (existing or generated):
    secretName: ""
  # CA bundle the gateway uses to verify the apiserver / edge-agent chain.
  ca:
    existingSecret: ""
    generate: false
    # Resolved secret name (existing or generated):
    secretName: ""
  minioBucket: edgeai-models
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 5

postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
  service:
    type: ClusterIP
    port: 5432
  auth:
    database: edgeai
    username: postgres
    # Leave empty to let the chart generate a random password and store
    # it in `<release>-postgresql-secret`. Set to a literal value for an
    # in-cluster dev Postgres. For production, prefer `existingSecret`.
    password: ""
    # Bring-your-own secret with the `password` key. When set, overrides
    # the auto-generated secret and `password` is ignored.
    existingSecret: ""
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  primary:
    podLabels: {}
    podAnnotations: {}
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 5

minio:
  enabled: false
  image:
    repository: minio/minio
    tag: "latest"
  service:
    type: ClusterIP
    port: 9000
    consolePort: 9001
  auth:
    rootUser: minioadmin
    # Leave empty to let the chart generate a random password and store
    # it in `<release>-minio-secret`. Set to a literal value for an
    # in-cluster dev MinIO. For production, prefer `existingSecret`.
    rootPassword: ""
    # Bring-your-own secret with the `rootpassword` key. When set,
    # overrides the auto-generated secret and `rootPassword` is ignored.
    existingSecret: ""
  persistence:
    enabled: true
    storageClass: ""
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  console:
    enabled: true
    service:
      type: ClusterIP
  defaultBuckets: "edgeai-models"
  makeBucketJob:
    enabled: false

prometheus:
  enabled: false
  image:
    repository: prom/prometheus
    tag: "latest"
  service:
    type: ClusterIP
    port: 9090
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  scrapeInterval: 15s
  evaluationInterval: 15s
  ruleFiles: []

# Database credentials consumed by apiserver, controller, and gateway-runtime.
db:
  # Bring-your-own secret. The secret must contain a `password` key (and
  # optionally `username` / `database`). When set, all auto-generation is
  # skipped and `username` / `password` / `database` below are ignored.
  existingSecret: ""
  # Name of the auto-generated secret. Ignored when `existingSecret` is set.
  secretName: edgeai-db
  # Auto-generate a Kubernetes Secret with a random password. Defaults to
  # `true` when the chart's own PostgreSQL is enabled, `false` otherwise.
  # Set explicitly to override (e.g. force auto-gen for an external DB).
  createSecret: false
  host: ""
  port: 5432
  username: postgres
  # Used by the auto-generated secret. Ignored when `existingSecret` is set.
  password: ""
  database: edgeai
  sslmode: disable
