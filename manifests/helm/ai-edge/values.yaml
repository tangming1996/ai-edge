global:
  imageRegistry: tming3379
  imagePullPolicy: IfNotPresent
  storageClass: ""

namespace: edgeai-system

imagePullSecrets: []

apiserver:
  enabled: true
  replicaCount: 2
  image:
    repository: edgeai-apiserver
    tag: "latest"
  service:
    type: ClusterIP
    grpcPort: 9090
    httpPort: 8080
  env:
    DB_SSLMODE: disable
    GRPC_ADDR: ":9090"
    HTTP_ADDR: ":8080"
  # CA certificate used to sign bootstrap / leaf certs.
  # Leave `ca.existingSecret` empty and set `ca.generate=true` to let the
  # chart render a self-signed CA on first install.
  ca:
    existingSecret: ""
    generate: false
    commonName: "edgeai-platform-ca"
    # When the secret is generated, it will be named:
    #   {{ include "ai-edge.fullname" . }}-apiserver-ca
    secretName: ""
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 5

controller:
  enabled: true
  replicaCount: 1
  image:
    repository: edgeai-controller
    tag: "latest"
  env:
    DB_SSLMODE: disable
    POLL_INTERVAL: 10s
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 256Mi

gatewayRuntime:
  enabled: true
  image:
    repository: edgeai-gateway-runtime
    tag: "latest"
  service:
    type: LoadBalancer
    grpcPort: 9443
    httpPort: 8081
  hostNetwork: false
  nodeSelector:
    node.edgeai.io/role: gateway
  tolerations:
    - key: node.edgeai.io/role
      value: gateway
      effect: NoSchedule
  # When true, the gateway-runtime pod calls
  # GatewayService.CreateGateway against the apiserver on startup so
  # the gateway row exists before any bootstrap token is created.
  # The call is idempotent on the gateway NAME, so rolling upgrades
  # and reboots do not duplicate rows. Disable only if you want to
  # keep the old "manually INSERT INTO gateways" workflow (e.g. when
  # the apiserver is offline at install time and you bootstrap the
  # table from a SQL dump).
  #
  # NOTE: per-gateway business attributes (name / region / endpoint)
  # are intentionally NOT exposed as chart-level values, and the
  # DaemonSet does NOT read them from K8s Node annotations either —
  # the Downward API for `metadata.annotations[...]` only surfaces
  # the Pod's own annotations, not the Node's, so the earlier
  # annotation-based wiring was silently producing empty env vars
  # (NAME falling back to the node name, REGION / ENDPOINT being
  # dropped entirely). The current contract is:
  #   - NAME  = K8s node name, via `fieldRef: spec.nodeName`.
  #   - REGION / ENDPOINT / labels are operator-controlled
  #     metadata that does not change on every Pod restart. They
  #     are filled in after `helm install` via
  #     `edgectl gateway update <name> --region ... --endpoint ...`,
  #     see `cmd/edgectl/gateway.go` and `docs/cli-usage.md § 1.4.3`.
  # `gatewayRuntime.env.GATEWAY_NAME` / `GATEWAY_REGION` /
  # `GATEWAY_ENDPOINT` remain available for debug / unit-test
  # purposes only; production charts must leave them unset.
  autoRegister: true
  env:
    # CONTROL_PLANE_ADDR is intentionally NOT set here. The chart
    # auto-derives it from the apiserver Service FQDN via the
    # `ai-edge.apiserverAddr` helper, so renaming the release no
    # longer breaks the gateway-runtime → apiserver link. If you
    # really need to override (e.g. point at a manually deployed
    # apiserver outside the cluster), inject the env in your own
    # values overlay.
    HTTP_ADDR: ":8081"
    GRPC_ADDR: ":9443"
    CACHE_DIR: "/var/lib/edgeai/gateway-cache"
    IDENTITY_CACHE_TTL: 30s
    TASK_CLAIM_DURATION: 5m
    CONNECTIVITY_CHECK_INTERVAL: 10s
    CONNECTIVITY_TIMEOUT: 5s
  # mTLS server certificate (tls.crt / tls.key) presented to edge-agents.
  # Either point at your own secret or set `tls.generate=true` for a
  # self-signed cert.
  tls:
    existingSecret: ""
    generate: false
    commonName: "edgeai-gateway"
    # Resolved secret name (existing or generated):
    secretName: ""
  # CA bundle the gateway uses to verify the apiserver / edge-agent chain.
  ca:
    existingSecret: ""
    generate: false
    # Resolved secret name (existing or generated):
    secretName: ""
  minioBucket: edgeai-models
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 5

postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
  service:
    type: ClusterIP
    port: 5432
  auth:
    database: edgeai
    username: postgres
    # 内部 PostgreSQL 的密码统一来自 `edgeai-db` Secret
    # (db.secretName)的 `password` 字段,与应用组件保持一致。
    # 因此本节不再暴露 `password` 字段——若需要固定开发密码,
    # 请使用 `db.password` 或在外部自己维护 `db.existingSecret`。
    # Bring-your-own secret with the `password` key. When set, overrides
    # the auto-generated `edgeai-db` Secret and the bundled PostgreSQL
    # is not deployed.
    existingSecret: ""
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  primary:
    podLabels: {}
    podAnnotations: {}
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 5

minio:
  enabled: false
  image:
    repository: minio/minio
    tag: "latest"
  service:
    type: ClusterIP
    port: 9000
    consolePort: 9001
  auth:
    rootUser: minioadmin
    # Leave empty to let the chart generate a random password and store
    # it in `<release>-minio-secret`. Set to a literal value for an
    # in-cluster dev MinIO. For production, prefer `existingSecret`.
    rootPassword: ""
    # Bring-your-own secret with the `rootpassword` key. When set,
    # overrides the auto-generated secret and `rootPassword` is ignored.
    existingSecret: ""
  persistence:
    enabled: true
    storageClass: ""
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  console:
    enabled: true
    service:
      type: ClusterIP
  defaultBuckets: "edgeai-models"
  makeBucketJob:
    enabled: false

prometheus:
  enabled: false
  image:
    repository: prom/prometheus
    tag: "latest"
  service:
    type: ClusterIP
    port: 9090
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  scrapeInterval: 15s
  evaluationInterval: 15s
  ruleFiles: []

# Database credentials consumed by apiserver, controller, and gateway-runtime.
db:
  # Bring-your-own secret. The secret must contain a `password` key (and
  # optionally `username` / `database`). When set, all auto-generation is
  # skipped and `username` / `password` / `database` below are ignored.
  existingSecret: ""
  # Name of the auto-generated secret. Ignored when `existingSecret` is set.
  secretName: edgeai-db
  # Auto-generate a Kubernetes Secret with a random password. Defaults to
  # `true` when the chart's own PostgreSQL is enabled, `false` otherwise.
  # Set explicitly to override (e.g. force auto-gen for an external DB).
  createSecret: false
  host: ""
  port: 5432
  username: postgres
  # Used by the auto-generated secret. Ignored when `existingSecret` is set.
  password: ""
  database: edgeai
  sslmode: disable

# Database migrations.
#
# On every `helm install` / `helm upgrade` the chart renders a
# pre-install,pre-upgrade Job that runs `golang-migrate` against the
# target database using the same credentials as the apiserver. This
# removes the "table is missing" footgun that previously required an
# out-of-band `make migrate-up`.
#
# The Job is a Helm hook: it is created before the rest of the release
# and removed after a successful run. Helm blocks the install/upgrade
# until the Job reports `Complete`, so apiserver / controller / gateway
# pods only ever start against a fully migrated schema.
migration:
  # Master switch. Set to false to skip automatic migrations — useful
  # when the operator runs migrations out of band (e.g. against a
  # managed Postgres with a maintenance window) and wants the chart to
  # leave the schema alone.
  enabled: true
  # Image used to run the migrations. Defaults to the upstream
  # `migrate/migrate` image so the chart stays self-contained — no
  # extra Go binary or build step is required. Override when running in
  # an air-gapped environment that mirrors the image into a private
  # registry.
  image:
    repository: migrate/migrate
    tag: v4.17.1
    # Override `global.imagePullPolicy` for the migration Job when the
    # upstream tag changes (Helm tag immutability is the same story
    # as for the rest of the chart).
    pullPolicy: ""
  # Backoff and TTL for the migration Job. Most runs complete in
  # seconds; a cold start against a fresh database can take ~30s while
  # the bundled Postgres pod is being created and made ready.
  activeDeadlineSeconds: 600
  backoffLimit: 5
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
