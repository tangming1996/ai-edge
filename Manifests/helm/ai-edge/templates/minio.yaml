{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-minio
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ai-edge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        {{- include "ai-edge.labels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - name: minio-api
              containerPort: 9000
              protocol: TCP
            - name: minio-console
              containerPort: 9001
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.auth.rootUser }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.existingSecret | default (printf "%s-minio-secret" .Release.Name) }}
                  key: minio-password
          resources:
            {{- toYaml .Values.minio.resources | nindent 10 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.minio.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-minio
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.minio.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-minio
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  accessModes:
    - ReadWriteOnce
  {{- include "ai-edge.pvc" (dict "root" . "storageClass" .Values.minio.persistence.storageClass "size" .Values.minio.persistence.size) | nindent 2 }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-minio
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: {{ .Values.minio.service.type }}
  selector:
    {{- include "ai-edge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  ports:
    - name: minio-api
      port: {{ .Values.minio.service.port }}
      targetPort: minio-api
      protocol: TCP
---
{{- if .Values.minio.console.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-minio-console
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-edge.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: {{ .Values.minio.console.service.type }}
  selector:
    {{- include "ai-edge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  ports:
    - name: console
      port: {{ .Values.minio.service.consolePort }}
      targetPort: minio-console
      protocol: TCP
{{- end }}
{{- end }}
